# Hot AI Nginx config — template
# Edit: replace YOUR_DOMAIN with your actual domain.
# After `certbot --nginx -d YOUR_DOMAIN`, certbot will rewrite the server blocks.

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Allow Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    # Everything else redirects to HTTPS (certbot adds this automatically too)
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # ssl_certificate and ssl_certificate_key are added by certbot

    gzip on;
    gzip_types text/plain text/css text/xml application/javascript application/json application/rss+xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Next.js static assets — long cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Everything else to Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    client_max_body_size 10m;
}
